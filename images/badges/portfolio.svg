<svg xmlns="http://www.w3.org/2000/svg" width="320" height="56" viewBox="0 0 320 56">
  <defs>
    <!-- Animated Gradient for Borders, Icons, and Accents -->
    <linearGradient id="green-rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008783">
        <animate attributeName="stop-color" values="#008783;#00b49c;#67D79C;#00b49c;#008783" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#00b49c">
        <animate attributeName="stop-color" values="#00b49c;#67D79C;#008783;#67D79C;#00b49c" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#67D79C">
        <animate attributeName="stop-color" values="#67D79C;#008783;#00b49c;#008783;#67D79C" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Deep Glow Filter for the Background Border -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glassmorphic Light Sweep Shimmer -->
    <linearGradient id="shimmer-sweep" x1="-100%" y1="-100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <animate attributeName="x1" values="-100%;150%" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="y1" values="-100%;150%" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;250%" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="y2" values="0%;250%" dur="3.5s" repeatCount="indefinite" />
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      
      .badge-group {
        transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        transform-origin: center;
        cursor: pointer;
      }
      .badge-group:hover {
        transform: scale(1.03);
      }
      .badge-bg {
        fill: #0B1317;
        stroke: url(#green-rainbow);
        stroke-width: 2;
        transition: fill 0.3s, stroke-width 0.3s;
      }
      .badge-group:hover .badge-bg {
        fill: #0F1C22;
        stroke-width: 2.5;
      }
      .badge-text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 4px;
        fill: #FFFFFF;
        text-shadow: 0 0 10px rgba(103, 215, 92, 0.1);
        transition: fill 0.3s, text-shadow 0.3s;
      }
      .badge-group:hover .badge-text {
        fill: #E8FFF5;
        text-shadow: 0 0 15px rgba(103, 215, 156, 0.4);
      }
      .arrow-left-path, .arrow-right-path {
        fill: url(#green-rainbow);
      }
    </style>
  </defs>

  <!-- Deep Glowing Underlay -->
  <rect x="6" y="6" width="308" height="44" rx="22" fill="none" stroke="url(#green-rainbow)" stroke-width="4" filter="url(#glow-filter)" opacity="0.4" />

  <!-- Interactive Badge Group -->
  <g class="badge-group">
    <!-- Main Capsule Body -->
    <rect class="badge-bg" x="2" y="2" width="316" height="52" rx="26" />

    <!-- Shimmer Layer (clipped to capsule shape) -->
    <rect x="2" y="2" width="316" height="52" rx="26" fill="url(#shimmer-sweep)" pointer-events="none" />

    <!-- Centered Content Layout -->
    <g transform="translate(160, 28)">
      <!-- Left Arrow (pointing right) -->
      <g transform="translate(-115, -12)">
        <g>
          <path class="arrow-left-path" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
          <animateTransform 
            attributeName="transform" 
            type="translate" 
            values="0,0; 3,0; 0,0" 
            dur="1.2s" 
            repeatCount="indefinite" />
        </g>
      </g>

      <!-- Text Label -->
      <text x="0" y="5" class="badge-text" text-anchor="middle">//PORTFOLIO//</text>

      <!-- Right Arrow (pointing left) -->
      <g transform="translate(91, -12)">
        <g>
          <path class="arrow-right-path" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
          <animateTransform 
            attributeName="transform" 
            type="translate" 
            values="0,0; -3,0; 0,0" 
            dur="1.2s" 
            repeatCount="indefinite" />
        </g>
      </g>
    </g>
  </g>
</svg>
