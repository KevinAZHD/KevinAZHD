name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-timezone:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.tz.outputs.should_run }}
    steps:
      - name: Check if midnight in Madrid
        id: tz
        run: |
          HOUR=$(TZ='Europe/Madrid' date +%H)
          echo "Current hour in Madrid: $HOUR"
          echo "should_run=$( [ "$HOUR" = "00" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  update-game:
    needs: check-timezone
    if: needs.check-timezone.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
          fps: 40

      - name: Rewrite commit author to count as contribution
        run: |
          git config --local user.email "${{ vars.USER_EMAIL }}"
          git config --local user.name "KevinAZHD"
          git commit --amend --reset-author --no-edit
          git push --force-with-lease
